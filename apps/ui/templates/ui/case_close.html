{% extends "ui/base.html" %}
{% block title %}إغلاق الحالة{% endblock %}
{% block content %}
<h2 class="mb-3">إغلاق الحالة #{{ case.id }}</h2>
<p class="text-muted">المعلم: <strong>{{ case.teacher }}</strong> | الدورة: <strong>{{ case.cycle.name }}</strong></p>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2">
        <button class="btn btn-danger" type="submit">تأكيد الإغلاق</button>
        <a class="btn btn-outline-secondary" href="{% url 'ui:cases' %}">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
