<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>body { font-family: "Tahoma", "Arial", sans-serif; }</style>
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3 class="mb-3">نظام تقييم أداء المعلمين</h3>
            <p class="text-muted">سجل الدخول للوصول إلى لوحة التحكم.</p>
            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label class="form-label" for="id_username">اسم المستخدم</label>
                <input class="form-control" type="text" name="username" autofocus required id="id_username">
              </div>
              <div class="mb-3">
                <label class="form-label" for="id_password">كلمة المرور</label>
                <input class="form-control" type="password" name="password" required id="id_password">
              </div>
              {% if form.errors %}
                <div class="alert alert-danger py-2">بيانات الدخول غير صحيحة.</div>
              {% endif %}
              <button class="btn btn-primary w-100" type="submit">دخول</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
